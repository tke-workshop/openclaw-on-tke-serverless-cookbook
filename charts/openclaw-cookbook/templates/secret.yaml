{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw-cookbook.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-cookbook.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.env }}
  {{ $key }}: {{ $value | default (printf "<your-%s>" (lower $key)) | quote }}
  {{- end }}
  GATEWAY_TOKEN: {{ .Values.gateway.authToken | default (randAlphaNum 48) | quote }}
{{- end }}
 