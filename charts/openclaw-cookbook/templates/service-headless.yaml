apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-cookbook.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-cookbook.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "openclaw-cookbook.selectorLabels" . | nindent 4 }}
  ports:
    - name: gateway
      port: {{ .Values.gateway.port }}
      targetPort: gateway
      protocol: TCP
