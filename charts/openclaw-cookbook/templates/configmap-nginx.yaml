{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw-cookbook.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-cookbook.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid       /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        # ---- 基础设置 ----
        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        # ---- 日志 ----
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        access_log /var/log/nginx/access.log main;

        # ---- WebSocket 协议升级映射 ----
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # ---- HTTP (80) ----
        # 来自 Ingress Gateway 的流量已在网关层完成 TLS 终止，
        # 通过 X-Forwarded-Proto 判断：外部直接 HTTP 访问则重定向 HTTPS，
        # 经过网关代理的流量直接转发到应用。
        server {
            listen 80;
            server_name _;

            # 未经代理的直接 HTTP 请求 → 重定向 HTTPS
            if ($http_x_forwarded_proto = '') {
                return 301 https://$host$request_uri;
            }

            # 来自 Ingress Gateway / 反向代理 → 直接转发
            location / {
                proxy_pass http://127.0.0.1:{{ .Values.gateway.port }};
                proxy_http_version 1.1;

                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Port $server_port;

                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
                proxy_connect_timeout 75s;

                proxy_buffering off;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
            }
        }

        # ---- HTTPS 服务器 ----
        server {
            listen {{ .Values.nginx.httpsPort }} ssl;
            http2 on;
            server_name _;

            # SSL 证书
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;

            # SSL 协议与加密套件
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
            ssl_prefer_server_ciphers off;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 10m;

            # 安全响应头
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options nosniff;

            # 反向代理到 OpenClaw Gateway (同 Pod 内 localhost)
            location / {
                proxy_pass http://127.0.0.1:{{ .Values.gateway.port }};
                proxy_http_version 1.1;

                # WebSocket 协议升级（必须配置，否则连接会断开）
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;

                # 转发客户端真实信息
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Port $server_port;

                # 超时配置（支持长连接，防止 WebSocket 频繁断开）
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
                proxy_connect_timeout 75s;

                # 关闭缓冲（实时交互场景）
                proxy_buffering off;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
            }
        }
    }
{{- end }}
