{{- if and .Values.istio.enabled .Values.egressPolicy.enabled (or .Values.istio.install.enabled (.Capabilities.APIVersions.Has "networking.istio.io/v1beta1")) }}
---
# Sidecar — 限制 Envoy 的 egress 可达范围
# 仅允许看到 istio-system 和本 namespace 的服务，阻断内网横向探测。
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: {{ include "openclaw-cookbook.fullname" . }}-sidecar
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-cookbook.labels" . | nindent 4 }}
  {{- if .Values.istio.install.enabled }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
  {{- end }}
spec:
  workloadSelector:
    labels:
      {{- include "openclaw-cookbook.selectorLabels" . | nindent 6 }}
  egress:
    - hosts:
        # istiod 通信（xDS 配置推送）
        - "istio-system/*"
        # 本 namespace 内的服务（含 ServiceEntry 注册的外部域名）
        - "{{ .Release.Namespace }}/*"
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
{{- end }}
