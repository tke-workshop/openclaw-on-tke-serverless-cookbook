apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openclaw-cookbook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-cookbook.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "openclaw-cookbook.fullname" . }}-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "openclaw-cookbook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-cookbook.selectorLabels" . | nindent 8 }}
        {{- if .Values.istio.enabled }}
        sidecar.istio.io/inject: "true"
        {{- end }}
      annotations:
        {{- if .Values.eip.enabled }}
        eks.tke.cloud.tencent.com/eip-attributes: '{"InternetMaxBandwidthOut":{{ .Values.eip.bandwidthOut }},"InternetChargeType":"{{ .Values.eip.chargeType }}"}'
        {{- end }}
        {{- if .Values.imageCache.enabled }}
        eks.tke.cloud.tencent.com/use-image-cache: "auto"
        {{- end }}
        {{- if .Values.dataPersistence.enabled }}
        eks.tke.cloud.tencent.com/container-data-persist-duration: {{ .Values.dataPersistence.duration | quote }}
        eks.tke.cloud.tencent.com/pod-resource: '{"disk":{"size":{{ .Values.dataPersistence.disk.size }},"type":"{{ .Values.dataPersistence.disk.type }}"}}'
        {{- end }}
        {{- if .Values.securityGroup.enabled }}
        eks.tke.cloud.tencent.com/security-group-id: {{ .Values.securityGroup.ids | join "," | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /data
              {{- $configFile := "/config/openclaw.json" }}
              {{- $dataFile := "/data/openclaw.json" }}
              cp {{ $configFile }} {{ $dataFile }}
              {{- range $envKey, $placeholder := .Values.secrets.placeholders }}
              sed -i "s|{{ $placeholder }}|${{ $envKey }}|g" {{ $dataFile }}
              {{- end }}
              chown 1000:1000 {{ $dataFile }}
          securityContext:
            runAsUser: 0
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "openclaw-cookbook.fullname" .)) }}
          volumeMounts:
            - name: openclaw-config
              mountPath: /config
              readOnly: true
            - name: openclaw-data
              mountPath: /data
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
          # startupProbe: 启动期间允许最多 300 秒（10s × 30 次），期间 liveness 不生效
          startupProbe:
            {{- if .Values.nginx.enabled }}
            # Gateway bind=loopback 时，通过 Nginx 反向代理间接探测
            httpGet:
              path: /healthz
              port: {{ .Values.nginx.httpsPort }}
              scheme: HTTPS
            {{- else }}
            httpGet:
              path: /healthz
              port: gateway
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            {{- if .Values.nginx.enabled }}
            httpGet:
              path: /healthz
              port: {{ .Values.nginx.httpsPort }}
              scheme: HTTPS
            {{- else }}
            httpGet:
              path: /healthz
              port: gateway
            {{- end }}
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            {{- if .Values.nginx.enabled }}
            httpGet:
              path: /healthz
              port: {{ .Values.nginx.httpsPort }}
              scheme: HTTPS
            {{- else }}
            httpGet:
              path: /healthz
              port: gateway
            {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.nginx.enabled }}
        # ---- Nginx HTTPS 反向代理 Sidecar ----
        # OpenClaw Web Crypto API 强制要求 HTTPS 或 localhost，
        # 通过 Nginx 提供 TLS 终止 + WebSocket 协议升级。
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.nginx.httpsPort }}
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
          securityContext:
            runAsNonRoot: false       # Nginx 需要 root 启动（绑定特权端口 + worker 进程管理）
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE    # 绑定 443/80 特权端口
                - CHOWN               # 启动时 chown cache 目录
                - SETUID              # master→worker 进程降权
                - SETGID              # master→worker 进程降权
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-tls
              mountPath: /etc/nginx/ssl
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: openclaw-config
          configMap:
            name: {{ include "openclaw-cookbook.fullname" . }}-config
        {{- if .Values.nginx.enabled }}
        - name: nginx-config
          configMap:
            name: {{ include "openclaw-cookbook.fullname" . }}-nginx
        - name: nginx-tls
          secret:
            secretName: {{ .Values.nginx.tls.existingSecret | default (printf "%s-tls" (include "openclaw-cookbook.fullname" .)) }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: openclaw-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
