{{- if and .Values.nginx.enabled (not .Values.nginx.tls.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw-cookbook.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-cookbook.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if and .Values.nginx.tls.cert .Values.nginx.tls.key }}
  {{/* 方式一: 用户手动提供证书 PEM */}}
  tls.crt: {{ .Values.nginx.tls.cert | b64enc }}
  tls.key: {{ .Values.nginx.tls.key | b64enc }}
  {{- else if .Values.nginx.tls.autoGenerate }}
  {{/* 方式二: 自动生成自签名证书 */}}
  {{- $cn := .Values.nginx.tls.commonName | default "openclaw" }}
  {{- $days := .Values.nginx.tls.daysValid | default 3650 | int }}
  {{- $altNames := list $cn "localhost" }}
  {{- $ipList := list "127.0.0.1" }}
  {{- $cert := genSelfSignedCert $cn $ipList $altNames $days }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  {{- else }}
  tls.crt: ""
  tls.key: ""
  {{- end }}
{{- end }}
