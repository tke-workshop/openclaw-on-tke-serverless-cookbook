# ====================================================================
# OpenClaw Cookbook — Standard Profile (默认推荐)
# 平台能力 + 开源治理（Istio 网络策略）
# ====================================================================
# 一键部署:
#   helm install cookbook ./charts/openclaw-cookbook/ \
#     --namespace openclaw --create-namespace \
#     --set secrets.existingSecret=openclaw-secrets
#
# Istio 将通过 pre-install hook 自动安装到 istio-system namespace。
# 如集群已有 Istio，设置 istio.install.enabled=false 跳过安装。
# ====================================================================

global:
  governanceMode: cookbook      # cookbook | cloud-gateway（预留）
  imageRegistry: ""            # 全局镜像仓库前缀（可选）

# ==================== 实例配置 ====================
instance:
  owner: ""                    # 实例所有者标签（多实例场景）

# ==================== 基础镜像 ====================
image:
  repository: ccr.ccs.tencentyun.com/openclaw-cookbook/openclaw
  tag: main
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ==================== 资源规格 ====================
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# ==================== 网络 ====================
service:
  type: LoadBalancer              # LoadBalancer 暴露到公网（CLB 直连 Pod ENI）
  port: 443                       # CLB 监听端口（HTTPS）
  annotations: {}

# ==================== Nginx HTTPS 反向代理 ====================
# OpenClaw Web Crypto API 强制要求 HTTPS 或 localhost，
# 通过 Nginx sidecar 提供 TLS 终止 + WebSocket 支持。
# 用户通过 https://<CLB-IP> 访问即可。
#
# TLS 证书:
#   方式一（推荐）: 引用已存在的 Secret（类型 kubernetes.io/tls）
#     nginx:
#       tls:
#         existingSecret: "my-tls-secret"
#
#   方式二: 自动生成自签名证书（开发/测试用）
#     nginx:
#       tls:
#         autoGenerate: true
#
#   方式三: 直接在 values 中提供证书内容
#     nginx:
#       tls:
#         cert: |
#           -----BEGIN CERTIFICATE-----
#           ...
#         key: |
#           -----BEGIN PRIVATE KEY-----
#           ...
nginx:
  enabled: true
  image:
    repository: nginx
    tag: 1.27-alpine
    pullPolicy: IfNotPresent
  httpsPort: 443                  # Nginx HTTPS 监听端口
  tls:
    existingSecret: ""            # 引用已有的 TLS Secret
    autoGenerate: true            # 自动生成自签名证书（existingSecret 未设置时生效）
    cert: ""                      # 手动提供证书 PEM
    key: ""                       # 手动提供私钥 PEM
    commonName: "openclaw"        # 自签名证书 CN
    daysValid: 3650               # 自签名证书有效期（天）
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ==================== Secret（API Keys）====================
# 方式一（推荐）: 引用已存在的 Secret
#   secrets:
#     existingSecret: "my-secrets"
#
# 方式二: 直接在 values 中设置（仅测试用）
#   secrets:
#     env:
#       API_KEY: "sk-or-v1-xxx"
secrets:
  existingSecret: ""
  env: {}
  placeholders:
    API_KEY: "__API_KEY__"
    GATEWAY_TOKEN: "__GATEWAY_TOKEN__"

# ==================== AI Provider ====================
# 默认使用 OpenRouter（兼容 OpenAI 协议的聚合网关）
# 切换 provider 示例:
#   --set provider.name=openai --set provider.baseUrl=https://api.openai.com/v1 --set provider.defaultModel=gpt-4o
#   --set provider.name=anthropic --set provider.baseUrl=https://api.anthropic.com/v1 --set provider.api=anthropic-messages --set provider.defaultModel=claude-sonnet-4-20250514
provider:
  name: openrouter
  baseUrl: "https://openrouter.ai/api/v1"
  api: openai-completions            # openai-completions | anthropic-messages | google-generative-ai
  defaultModel: "z-ai/glm-5"        # provider 下的模型 ID

gateway:
  port: 20000
  authToken: ""                # Gateway 认证 token，为空时自动生成

# ==================== 第一层: 平台能力 ====================

imageCache:
  enabled: true

storage:
  storageClass: cbs
  size: 10Gi

dataPersistence:
  enabled: true
  duration: "168h"
  disk:
    size: 20
    type: "SSD_CLOUD_PREMIUM"

securityGroup:
  enabled: false
  ids: []

networkPolicy:
  enabled: false

gatekeeper:
  enabled: false

hibernate:
  enabled: false

# ==================== 第二层: 治理能力 ====================

# --- Istio 服务治理（自动安装 + 启用）---
istio:
  enabled: true
  install:
    enabled: true                   # 自动安装 Istio 控制面
    version: "1.24.6"
    image: "ccr.ccs.tencentyun.com/openclaw-cookbook/helm:3.17.1"
    uninstallOnDelete: false        # 卸载应用时保留 Istio（其他应用可能依赖）
    repoRetries: 5                  # helm repo add/update 失败重试次数
    repoRetryDelay: 10              # 重试间隔（秒）
    pilot:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
    meshConfig:
      outboundTrafficPolicy: REGISTRY_ONLY  # 严格出站白名单模式
      accessLogFile: /dev/stdout
      accessLogEncoding: JSON
      holdApplicationUntilProxyStarts: true

# --- 出站白名单 ---
egressPolicy:
  enabled: true
  allowlist:
    - api.openai.com
    - api.anthropic.com
    - generativelanguage.googleapis.com
    - openrouter.ai
  circuitBreaker:
    enabled: true
    maxConnections: 100
    connectTimeout: 10s
    consecutive5xxErrors: 3
    interval: 30s
    baseEjectionTime: 60s

# --- CLS 日志（预留）---
cls:
  enabled: false
